name: CI

on:
  push:
    # launch-fixes is the pre-publication working branch (successor to the
    # merged launch-prep); per-issue PRs target it and the final
    # launch-fixes -> main merge is manual. add-firefox-support is the
    # Firefox-port feature branch with the same working agreement (#269).
    branches: [main, launch-fixes, add-firefox-support]
  pull_request:
    branches: [main, launch-fixes, add-firefox-support]

permissions:
  contents: read

# A newer push to the same branch/PR supersedes the running build.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - uses: extractions/setup-just@v4

      - run: bun install --frozen-lockfile

      - run: just check

      - run: just lint

      - run: just format_check

      - run: just check_locales

      - run: just test

      # package_zip depends on the build recipe, so this also verifies the build
      - run: just package_zip

      # lint_firefox depends on build_firefox, so this also verifies the
      # Firefox-target build; web-ext lint (AMO's linter) failing fails CI.
      - run: just lint_firefox

      - run: just package_zip_firefox

      # Explicit per-browser globs: both zips live in builds/, so each
      # artifact must name its own suffix.
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-zip
          path: builds/*_Chrome.zip
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: firefox-zip
          path: builds/*_Firefox.zip
          if-no-files-found: error

  # Proves the AMO source package rebuilds to the shipped Firefox artifact:
  # build once from the checkout, once from a clean `git archive` of the
  # same tree (exactly what the release attaches as the source zip), and
  # fail on ANY content difference. Zip container timestamps are the only
  # thing not normalized, hence the extracted-tree comparison.
  reproducible-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - run: bun install --frozen-lockfile

      - name: Build from the checkout
        run: bun run scripts/build.ts --target firefox

      - name: Build from the source package
        run: |
          git archive --format=tar HEAD | (mkdir -p /tmp/source-pkg && tar -x -C /tmp/source-pkg)
          cd /tmp/source-pkg
          bun install --frozen-lockfile
          bun run scripts/build.ts --target firefox

      - name: Compare artifacts byte for byte
        run: |
          diff -r builds/firefox /tmp/source-pkg/builds/firefox
          echo "reproducible: source-package rebuild is content-identical"

  # Real-Firefox end-to-end suite: headless Firefox + geckodriver drive the
  # packaged artifact through the automated docs/testing-firefox.md rows
  # (baseline/TCP/FPI cleanup, marker cookie, site-data plumbing).
  e2e-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: browser-actions/setup-firefox@v1
        id: setup-firefox
        with:
          firefox-version: latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - uses: extractions/setup-just@v4

      - run: bun install --frozen-lockfile

      - run: just e2e_firefox
        env:
          FIREFOX_BIN: ${{ steps.setup-firefox.outputs.firefox-path }}

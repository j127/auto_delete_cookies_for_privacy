name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - uses: extractions/setup-just@v4

      - run: bun install --frozen-lockfile

      - run: just check

      - run: just lint

      - run: just format_check

      - run: just check_locales

      - run: just test

      - run: just release_check

      - run: just package_zip

      - run: just package_zip_firefox

      # AMO requires source submission for bundled extensions. git archive
      # of the tag is exactly the reviewable tree (gitignored outputs are
      # excluded by construction) and includes README-BUILD.md with the
      # pinned-Bun rebuild instructions; CI's reproducible-firefox job
      # proves the rebuild is content-identical.
      - name: Package the source zip
        run: git archive --format=zip -o "builds/Auto-Delete-Cookies-for-Privacy_${GITHUB_REF_NAME}_Source.zip" HEAD

      # Draft release with the Chrome, Firefox, and source zips attached;
      # publishing stays manual. Store uploads are intentionally absent:
      # this fork has no relation to the original project's Chrome Web
      # Store / AMO listings or secrets.
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" builds/*.zip --draft --generate-notes --title "$GITHUB_REF_NAME"

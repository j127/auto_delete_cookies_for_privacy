version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for Bun (package.json + bun.lock)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    # Major bumps are handled deliberately in the phased modernization
    # issues (React in Phase 3, etc.); Dependabot keeps minors and patches
    # flowing.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
